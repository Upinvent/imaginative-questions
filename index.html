<style>
:root {
  --gold: #c9a84c; --gold-light: #e8c96a;
  --gold-subtle: rgba(201,168,76,0.08); --gold-dim: rgba(201,168,76,0.18);
  --bg: #0b0a09; --surface: #111009; --surface2: #181610;
  --text: #f0ead8; --text-dim: rgba(240,234,216,0.5); --text-faint: rgba(240,234,216,0.22);
  --border: rgba(201,168,76,0.18); --border-focus: rgba(201,168,76,0.55);
  --red: #c0392b; --green: #27ae60; --radius: 3px;
  --sidebar-w: 230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;overflow-x:hidden;}

/* TOAST */
#toast{position:fixed;top:20px;right:20px;z-index:9999;background:var(--gold);color:#0b0a09;padding:11px 22px;border-radius:var(--radius);font-size:15px;font-weight:600;letter-spacing:.4px;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .25s,transform .25s;max-width:320px;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.error{background:var(--red);color:#fff;}

/* SYNC BAR */
#sync-bar{position:fixed;bottom:0;left:0;right:0;z-index:888;background:rgba(11,10,9,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);letter-spacing:.5px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.saving{background:var(--gold);animation:blink .7s ease-in-out infinite;}
.sync-dot.error{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* VIEWS */
.view{display:none;min-height:100vh;}
.view.active{display:block;}

/* ═══ HOME ═══ */
#home{align-items:center;justify-content:center;position:relative;overflow:hidden;}
#home.active{display:flex;}
.home-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 25%,rgba(201,168,76,.1) 0%,transparent 65%);}
.home-bg::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 55px,rgba(201,168,76,.025) 55px,rgba(201,168,76,.025) 56px),repeating-linear-gradient(90deg,transparent,transparent 55px,rgba(201,168,76,.025) 55px,rgba(201,168,76,.025) 56px);}
.home-inner{position:relative;z-index:1;text-align:center;padding:60px 24px 100px;max-width:620px;width:100%;animation:fadeUp .6s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.home-eyebrow{color:var(--gold);font-size:11px;letter-spacing:5px;text-transform:uppercase;margin-bottom:20px;}
.home-title{font-family:'Playfair Display',serif;font-size:clamp(52px,12vw,96px);font-weight:900;color:var(--text);line-height:.95;margin-bottom:18px;text-shadow:0 4px 40px rgba(201,168,76,.15);}
.home-title em{font-style:italic;color:var(--gold);}
.home-sub{color:var(--text-dim);font-size:13px;letter-spacing:3px;margin-bottom:48px;font-style:italic;}
.home-divider{width:50px;height:1px;background:var(--border);margin:0 auto 36px;}
.home-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.btn-gold{background:var(--gold);color:#0b0a09;border:none;padding:15px 38px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;border-radius:var(--radius);transition:background .2s,transform .15s,box-shadow .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.25);}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,.4);padding:15px 38px;font-family:'Playfair Display',serif;font-size:16px;cursor:pointer;letter-spacing:.5px;border-radius:var(--radius);transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-ghost:hover{border-color:var(--gold);background:var(--gold-subtle);transform:translateY(-2px);}
.home-hint{color:var(--text-faint);font-size:12px;letter-spacing:1px;font-style:italic;}

/* ═══ QUESTION VIEW ═══ */
#question-view.active{display:block;}

/* Top bar */
.q-topbar{position:sticky;top:0;z-index:200;background:rgba(11,10,9,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;min-height:52px;}
.q-topbar-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.q-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:var(--gold);white-space:nowrap;}
.q-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.q-meta{display:flex;gap:8px;flex:1;min-width:0;}
.q-input{background:var(--gold-subtle);border:1px solid var(--border);color:var(--text);padding:6px 11px;font-family:'Cormorant Garamond',serif;font-size:14px;border-radius:var(--radius);outline:none;transition:border-color .2s;flex:1;min-width:0;}
.q-input:focus{border-color:var(--gold);}
.q-input::placeholder{color:var(--text-faint);font-style:italic;}
.q-topbar-right{display:flex;align-items:center;gap:8px;}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;font-family:'Cormorant Garamond',serif;font-size:13px;cursor:pointer;border-radius:var(--radius);transition:all .2s;white-space:nowrap;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm.gold{background:var(--gold);color:#0b0a09;border-color:var(--gold);font-weight:700;}
.btn-sm.gold:hover{background:var(--gold-light);}
.back-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:1px;padding:4px 0;transition:color .2s;}
.back-btn:hover{color:var(--gold);}

/* LAYOUT: sidebar + main */
.q-body{display:flex;min-height:calc(100vh - 52px);}

/* ── SIDEBAR (desktop) ── */
.q-sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;
  padding:20px 0;display:flex;flex-direction:column;
}
.q-sidebar::-webkit-scrollbar{width:4px;}
.q-sidebar::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}

/* Progress ring in sidebar */
.sidebar-prog{text-align:center;padding:0 16px 16px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.prog-svg{width:64px;height:64px;}
.prog-track{fill:none;stroke:var(--gold-dim);stroke-width:5;}
.prog-fill{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray .5s ease;}
.prog-pct{font-family:'Playfair Display',serif;font-size:12px;color:var(--gold);margin-top:5px;}

/* Sidebar nav items */
.snav-item{display:block;width:100%;background:none;border:none;text-align:left;padding:9px 16px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text-dim);transition:all .15s;border-left:2px solid transparent;line-height:1.3;}
.snav-item:hover{color:var(--text);background:var(--gold-subtle);}
.snav-item.active{color:var(--gold);background:rgba(201,168,76,.1);border-left-color:var(--gold);}
.snav-item.done{color:var(--text-dim);}
.snav-item.done .snav-num{color:var(--gold);}
.snav-num{font-weight:700;color:var(--gold);margin-right:6px;}

/* ── MOBILE NAV DROPDOWN ── */
.q-mobile-nav{display:none;background:var(--surface);border-bottom:1px solid var(--border);}
.q-mobile-nav-trigger{width:100%;background:none;border:none;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:14px;}
.q-mobile-nav-trigger .mnav-label{display:flex;align-items:center;gap:10px;}
.mnav-current{color:var(--gold);font-weight:600;}
.mnav-arrow{color:var(--text-dim);font-size:11px;transition:transform .2s;}
.mnav-arrow.open{transform:rotate(180deg);}
.q-mobile-dropdown{display:none;border-top:1px solid var(--border);}
.q-mobile-dropdown.open{display:block;}
.mnav-item{display:block;width:100%;background:none;border:none;text-align:left;padding:11px 20px 11px 30px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text-dim);transition:all .15s;border-left:3px solid transparent;}
.mnav-item:hover{color:var(--text);background:var(--gold-subtle);}
.mnav-item.active{color:var(--gold);background:rgba(201,168,76,.1);border-left-color:var(--gold);}
.mnav-item.done .mnav-num{color:var(--gold);}
.mnav-num{font-weight:700;margin-right:6px;color:rgba(201,168,76,.6);}
.mnav-frac{font-size:11px;color:var(--text-faint);margin-left:auto;}

/* ── MAIN CONTENT ── */
.q-main{flex:1;min-width:0;padding:36px 40px 130px;}
.q-page{display:none;max-width:800px;animation:fadeUp .3s ease both;}
.q-page.active{display:block;}
.q-page-num{color:var(--gold);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
.q-page-title{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,40px);font-weight:900;color:var(--text);margin-bottom:6px;line-height:1.1;}
.q-page-desc{color:var(--text-dim);font-size:13px;letter-spacing:2px;font-style:italic;margin-bottom:28px;}

/* Senses */
.senses-block{background:rgba(201,168,76,.05);border:1px solid var(--border);border-radius:4px;padding:18px;margin-bottom:26px;}
.senses-label{color:var(--gold);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;}
.senses-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.sense-item label{display:block;color:var(--text-dim);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.sense-item textarea{width:100%;background:var(--surface2);border:1px solid rgba(201,168,76,.15);color:var(--text);padding:7px 9px;font-family:'Cormorant Garamond',serif;font-size:13px;border-radius:var(--radius);resize:none;outline:none;line-height:1.5;transition:border-color .2s;height:70px;}
.sense-item textarea:focus{border-color:var(--gold);}
.sense-item textarea::placeholder{color:var(--text-faint);font-style:italic;}

/* Fields */
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.field-full{grid-column:1/-1;}
.field-label{display:block;color:var(--text-dim);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;}
.field-wrap textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 13px;font-family:'Cormorant Garamond',serif;font-size:15px;line-height:1.6;border-radius:var(--radius);resize:vertical;outline:none;min-height:78px;transition:border-color .2s,background .2s;}
.field-wrap textarea:focus{border-color:var(--border-focus);background:rgba(201,168,76,.03);}
.field-wrap textarea::placeholder{color:var(--text-faint);font-style:italic;}

/* Notes */
.notes-block{background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:4px;padding:18px;margin-top:4px;}
.notes-label{color:var(--gold);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:11px;}
#notes-textarea{width:100%;min-height:100px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 14px;font-family:'Cormorant Garamond',serif;font-size:15px;line-height:1.7;border-radius:var(--radius);resize:vertical;outline:none;transition:border-color .2s;}
#notes-textarea:focus{border-color:var(--border-focus);}
#notes-textarea::placeholder{color:var(--text-faint);font-style:italic;}

/* Floating nav */
.q-float-nav{position:fixed;bottom:34px;left:0;right:0;z-index:500;display:flex;justify-content:center;align-items:center;gap:14px;padding:0 24px;pointer-events:none;}
.q-float-nav button{pointer-events:all;}
.nav-prev{background:rgba(11,10,9,.94);backdrop-filter:blur(10px);border:1px solid var(--border);color:var(--gold);padding:11px 24px;font-family:'Cormorant Garamond',serif;font-size:14px;cursor:pointer;border-radius:var(--radius);transition:all .2s;}
.nav-prev:hover{border-color:var(--gold);background:rgba(201,168,76,.1);}
.nav-next{background:var(--gold);color:#0b0a09;border:none;padding:11px 28px;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;cursor:pointer;border-radius:var(--radius);transition:all .2s;box-shadow:0 4px 20px rgba(201,168,76,.3);}
.nav-next:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.4);}
.nav-fraction{color:var(--text-faint);font-size:11px;letter-spacing:1px;min-width:46px;text-align:center;}

/* ═══ LIBRARY ═══ */
#library.active{display:block;}
.lib-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.lib-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--text);flex:1;}
.lib-search-wrap{padding:16px 28px 0;}
.search-input{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 15px;font-family:'Cormorant Garamond',serif;font-size:15px;border-radius:var(--radius);outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--text-faint);font-style:italic;}
.lib-body{padding:18px 28px 80px;}
.empty-state{text-align:center;padding:70px 20px;animation:fadeUp .4s ease both;}
.empty-icon{font-size:50px;margin-bottom:14px;}
.empty-state p{color:var(--text-dim);font-style:italic;font-size:17px;margin-bottom:22px;}
.show-group{margin-bottom:36px;}
.show-label{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gold);margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.cards-row{display:flex;flex-wrap:wrap;gap:14px;}
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:18px 16px;width:200px;transition:all .2s;animation:fadeUp .35s ease both;}
.char-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.4);}
.char-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;}
.char-occ{color:var(--text-dim);font-size:12px;font-style:italic;margin-bottom:7px;min-height:17px;}
.char-date{color:rgba(201,168,76,.5);font-size:10px;letter-spacing:1px;margin-bottom:12px;}
.char-actions{display:flex;gap:6px;}
.ccard-btn{border:none;padding:6px 9px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:12px;border-radius:var(--radius);transition:all .15s;}
.ccard-btn.study{background:var(--gold);color:#0b0a09;font-weight:700;flex:1;}
.ccard-btn.study:hover{background:var(--gold-light);}
.ccard-btn.edit{background:rgba(255,255,255,.07);color:var(--text-dim);}
.ccard-btn.edit:hover{background:rgba(255,255,255,.13);color:var(--text);}
.ccard-btn.del{background:rgba(192,57,43,.12);color:rgba(192,57,43,.8);}
.ccard-btn.del:hover{background:rgba(192,57,43,.28);}

/* ═══ STUDY ═══ */
#study.active{display:block;}
.study-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;}
.study-char{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--text);line-height:1;}
.study-show{color:var(--gold);font-style:italic;font-size:14px;margin-top:5px;}
.study-info{flex:1;}
.study-btns{display:flex;gap:10px;align-items:center;}
.study-body{padding:24px 28px 80px;max-width:860px;}
.study-senses{background:var(--gold-subtle);border:1px solid var(--border);border-radius:4px;padding:16px 18px;margin-bottom:18px;}
.study-senses-title{color:var(--gold);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;}
.study-senses-row{display:flex;flex-wrap:wrap;gap:8px;}
.sense-chip{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;}
.sense-chip-name{color:var(--gold);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:3px;}
.sense-chip-val{color:var(--text);font-size:13px;}
.study-accordion{display:flex;flex-direction:column;gap:7px;}
.acc-item{border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.acc-btn{width:100%;background:var(--surface);border:none;padding:14px 18px;display:flex;align-items:center;cursor:pointer;transition:background .2s;gap:10px;}
.acc-btn:hover{background:var(--surface2);}
.acc-btn.open{background:rgba(201,168,76,.07);}
.acc-btn-title{flex:1;text-align:left;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);}
.acc-count{font-size:11px;color:var(--gold);}
.acc-arrow{color:var(--text-dim);font-size:10px;transition:transform .2s;}
.acc-btn.open .acc-arrow{transform:rotate(180deg);}
.acc-panel{display:none;padding:16px 18px;background:rgba(201,168,76,.03);border-top:1px solid var(--border);}
.acc-panel.open{display:block;animation:fadeUp .2s ease both;}
.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.acc-grid .field-full{grid-column:1/-1;}
.acc-f-label{color:rgba(201,168,76,.7);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.acc-f-val{color:var(--text);font-size:14px;line-height:1.6;white-space:pre-wrap;}
.study-notes{margin-top:16px;background:var(--gold-subtle);border:1px solid var(--border);border-radius:4px;padding:16px 18px;}
.study-notes-title{color:var(--gold);font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:9px;}
.study-notes-val{color:var(--text);font-size:14px;line-height:1.7;white-space:pre-wrap;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  /* Hide desktop sidebar, show mobile dropdown */
  .q-sidebar{display:none;}
  .q-mobile-nav{display:block;}
  .q-main{padding:22px 16px 130px;}
  .fields-grid{grid-template-columns:1fr;}
  .senses-grid{grid-template-columns:1fr 1fr;}
  .acc-grid{grid-template-columns:1fr;}
  .q-meta{flex-direction:column;gap:6px;}
  .q-topbar{flex-wrap:wrap;padding:8px 14px;gap:8px;}
  .q-topbar-right{width:100%;justify-content:flex-end;}
  .lib-topbar,.lib-body,.lib-search-wrap{padding-left:16px;padding-right:16px;}
  .study-topbar,.study-body{padding-left:16px;padding-right:16px;}
  .cards-row .char-card{width:100%;}
  .home-btns{flex-direction:column;align-items:center;}
  .q-float-nav{bottom:40px;}
  .btn-ghost,.btn-gold{padding:12px 24px;}
  .study-char{font-size:26px;}
}
@media(max-width:900px){
  .senses-grid{grid-template-columns:repeat(3,1fr);}
}
</style>

// ══════════════════════════════════════
// CONFIG — JSONbin keys

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const LS_DRAFT = 'iq_draft_v4';
const LS_LIB   = 'iq_lib_v4';

let draft    = freshDraft();
let library  = [];
let section  = 0;
let studyId  = null;
let saveTimer = null;
let syncing   = false;
let mnavOpen  = false;

function freshDraft() {
  const d = {id:null,charName:'',showName:'',senses:{},notes:'',savedAt:null};
  SECTIONS.forEach(s => s.fields.forEach(f => { d[f.id]=''; }));
  SENSES.forEach(s => { d.senses[s]=''; });
  return d;
}

// ══════════════════════════════════════
// LOCAL STORAGE
// ══════════════════════════════════════
function lsGet(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function loadLocal(){ const d=lsGet(LS_DRAFT);if(d)draft=d; const l=lsGet(LS_LIB);if(l)library=l; }
function saveLocal(){ lsSet(LS_DRAFT,draft); lsSet(LS_LIB,library); }

// ══════════════════════════════════════
// JSONBIN SYNC
// ══════════════════════════════════════
function syncOn(){ return CFG.KEY&&CFG.KEY!=='YOUR_MASTER_KEY_HERE'&&CFG.BIN&&CFG.BIN!=='YOUR_BIN_ID_HERE'; }

async function pushSync(){
  if(!syncOn()||syncing) return;
  syncing=true;
  setSync('saving','Syncing…');
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+CFG.BIN,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':CFG.KEY,'X-Bin-Versioning':'false'},
      body:JSON.stringify({library,updatedAt:new Date().toISOString()})
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSync('ok','Synced · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    setSync('error','Sync failed — working offline');
  }
  syncing=false;
}

async function pullSync(){
  if(!syncOn()) return;
  setSync('saving','Loading from cloud…');
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+CFG.BIN+'/latest',{headers:{'X-Master-Key':CFG.KEY}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.record&&Array.isArray(data.record.library)){
      const remote=data.record.library;
      const remoteIds=new Set(remote.map(e=>e.id));
      const localOnly=library.filter(e=>!remoteIds.has(e.id));
      library=[...remote,...localOnly];
      saveLocal();
      updateBadge();
    }
    setSync('ok','Synced · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    setSync('error','Sync unavailable — working offline');
  }
}

function setSync(state,msg){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(dot) dot.className='sync-dot'+(state==='saving'?' saving':state==='error'?' error':'');
  if(lbl) lbl.textContent=msg;
}

// ══════════════════════════════════════
// CAPTURE / POPULATE
// ══════════════════════════════════════
function capture(){
  const ce=document.getElementById('input-char');
  const se=document.getElementById('input-show');
  if(ce) draft.charName=ce.value;
  if(se) draft.showName=se.value;
  SECTIONS.forEach(s=>s.fields.forEach(f=>{
    const el=document.getElementById('f-'+f.id);
    if(el) draft[f.id]=el.value;
  }));
  SENSES.forEach(s=>{
    const el=document.getElementById('s-'+s);
    if(el) draft.senses[s]=el.value;
  });
  const ne=document.getElementById('notes-textarea');
  if(ne) draft.notes=ne.value;
}

function populate(){
  const ce=document.getElementById('input-char');
  const se=document.getElementById('input-show');
  if(ce) ce.value=draft.charName||'';
  if(se) se.value=draft.showName||'';
  SECTIONS.forEach(s=>s.fields.forEach(f=>{
    const el=document.getElementById('f-'+f.id);
    if(el) el.value=draft[f.id]||'';
  }));
  SENSES.forEach(s=>{
    const el=document.getElementById('s-'+s);
    if(el) el.value=(draft.senses&&draft.senses[s])||'';
  });
  const ne=document.getElementById('notes-textarea');
  if(ne) ne.value=draft.notes||'';
}

// ══════════════════════════════════════
// AUTO-SAVE
// ══════════════════════════════════════
function onInput(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    capture();
    autoSaveLib();
    saveLocal();
    setSync('saving','Saving…');
    setTimeout(pushSync,600);
  },700);
}

function autoSaveLib(){
  if(!draft.charName.trim()&&!draft.showName.trim()) return;
  if(!draft.id) draft.id=Date.now().toString();
  const entry={...draft,senses:{...draft.senses},savedAt:new Date().toISOString()};
  const idx=library.findIndex(e=>e.id===draft.id);
  if(idx!==-1) library[idx]=entry;
  else library.unshift(entry);
  updateBadge();
}

function manualSave(){
  capture();
  if(!draft.charName.trim()&&!draft.showName.trim()){
    toast('Enter a Character Name or Show name first.','error'); return;
  }
  autoSaveLib();
  saveLocal();
  pushSync();
  toast('Saved to Library! 🎭');
}

// VIEWS
// ══════════════════════════════════════
function show(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='library') renderLib();
  if(id==='home') updateBadge();
  window.scrollTo(0,0);
}

function updateBadge(){
  const el=document.getElementById('lib-badge');
  if(el) el.textContent=library.length>0?'('+library.length+')':'';
}

// ══════════════════════════════════════
// BUILD FORM
// ══════════════════════════════════════
function buildForm(){
  const sideNav  = document.getElementById('sidebar-nav');
  const mDrop    = document.getElementById('mnav-dropdown');
  const wrap     = document.getElementById('pages-wrap');
  sideNav.innerHTML=''; mDrop.innerHTML=''; wrap.innerHTML='';

  SECTIONS.forEach((sec,i)=>{
    // Desktop sidebar item
    const sb=document.createElement('button');
    sb.className='snav-item'+(i===0?' active':'');
    sb.id='snav-'+i;
    sb.innerHTML='<span class="snav-num">'+(i+1)+'</span>'+sec.title;
    sb.addEventListener('click',()=>goTo(i));
    sideNav.appendChild(sb);

    // Mobile dropdown item
    const mb=document.createElement('button');
    mb.className='mnav-item'+(i===0?' active':'');
    mb.id='mnav-'+i;
    mb.innerHTML='<span class="mnav-num">'+(i+1)+'</span>'+sec.title+'<span class="mnav-frac"></span>';
    mb.addEventListener('click',()=>{ goTo(i); closeMobileNav(); });
    mDrop.appendChild(mb);

    // Page
    const pg=document.createElement('div');
    pg.className='q-page'+(i===0?' active':'');
    pg.id='pg-'+i;

    let h='<div class="q-page-num">Question '+(i+1)+' of '+SECTIONS.length+'</div>'
         +'<div class="q-page-title">'+sec.title+'</div>'
         +'<div class="q-page-desc">'+sec.desc+'</div>';

    if(i===0){
      h+='<div class="senses-block"><div class="senses-label">The 5 Senses — how your character experiences the world</div><div class="senses-grid">';
      SENSES.forEach(s=>{
        h+='<div class="sense-item"><label>'+s+'</label>'
          +'<textarea id="s-'+s+'" placeholder="How do they experience '+s.toLowerCase()+'?"></textarea></div>';
      });
      h+='</div></div>';
    }

    h+='<div class="fields-grid">';
    sec.fields.forEach(f=>{
      h+='<div class="field-wrap'+(f.full?' field-full':'')+'"><label class="field-label">'+f.label+'</label>'
        +'<textarea id="f-'+f.id+'" placeholder="'+f.ph+'" rows="3"></textarea></div>';
    });
    h+='</div>';

    if(i===SECTIONS.length-1){
      h+='<div class="notes-block"><div class="notes-label">✎ Notes — Anything else you discover</div>'
        +'<textarea id="notes-textarea" placeholder="Rehearsal discoveries, director\'s notes, impulses, anything that doesn\'t fit the questions above…"></textarea></div>';
    }

    pg.innerHTML=h;
    wrap.appendChild(pg);
  });

  // Input listeners
  wrap.addEventListener('input',onInput);
  document.getElementById('input-char').addEventListener('input',onInput);
  document.getElementById('input-show').addEventListener('input',onInput);

  updateNav();
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function goTo(i){
  if(i<0||i>=SECTIONS.length) return;
  capture();
  section=i;

  document.querySelectorAll('.q-page').forEach((p,j)=>p.classList.toggle('active',j===i));

  // Update desktop sidebar
  document.querySelectorAll('.snav-item').forEach((el,j)=>{
    el.classList.toggle('active',j===i);
    el.classList.toggle('done',j!==i&&SECTIONS[j].fields.some(f=>(draft[f.id]||'').trim()));
  });

  // Update mobile dropdown
  document.querySelectorAll('.mnav-item').forEach((el,j)=>{
    el.classList.toggle('active',j===i);
    el.classList.toggle('done',j!==i&&SECTIONS[j].fields.some(f=>(draft[f.id]||'').trim()));
  });

  // Update mobile trigger label
  const cur=document.getElementById('mnav-current');
  if(cur) cur.textContent=(i+1)+'. '+SECTIONS[i].title;

  updateNav();
  updateProgress();
  window.scrollTo(0,0);
}

function updateNav(){
  const prev=document.getElementById('nav-prev');
  const next=document.getElementById('nav-next');
  const frac=document.getElementById('nav-frac');
  const last=section===SECTIONS.length-1;
  if(prev) prev.style.visibility=section===0?'hidden':'visible';
  if(next) next.textContent=last?'✦ Save to Library':'Next →';
  if(frac) frac.textContent=(section+1)+' / '+SECTIONS.length;
}

function updateProgress(){
  let total=0,filled=0;
  SECTIONS.forEach(s=>s.fields.forEach(f=>{ total++; const el=document.getElementById('f-'+f.id); if(el&&el.value.trim()) filled++; }));
  const pct=total>0?Math.round(filled/total*100):0;
  const circ=2*Math.PI*27;
  const fill=document.getElementById('prog-fill');
  const lbl=document.getElementById('prog-pct');
  if(fill) fill.setAttribute('stroke-dasharray',(circ*pct/100)+' '+circ);
  if(lbl)  lbl.textContent=pct+'% Complete';
}

// Mobile nav toggle
function closeMobileNav(){
  mnavOpen=false;
  const drop=document.getElementById('mnav-dropdown');
  const arrow=document.getElementById('mnav-arrow');
  if(drop) drop.classList.remove('open');
  if(arrow) arrow.classList.remove('open');
}

// ══════════════════════════════════════
// LIBRARY
// ══════════════════════════════════════
function renderLib(){
  const q=(document.getElementById('lib-search')?.value||'').toLowerCase();
  const body=document.getElementById('lib-body');
  if(!body) return;

  const items=library.filter(e=>
    (e.charName||'').toLowerCase().includes(q)||(e.showName||'').toLowerCase().includes(q)
  );

  if(!items.length){
    body.innerHTML='<div class="empty-state"><div class="empty-icon">🎭</div>'
      +'<p>'+(library.length===0?'No characters yet. Start your first one!':'No results for "'+esc(q)+'"')+'</p>'
      +(library.length===0?'<button class="btn-gold" id="empty-new">✦ Create Character</button>':'')
      +'</div>';
    document.getElementById('empty-new')?.addEventListener('click',startNew);
    return;
  }

  const groups={};
  items.forEach(e=>{ const k=e.showName||'— No Show Listed —'; if(!groups[k])groups[k]=[]; groups[k].push(e); });

  body.innerHTML=Object.entries(groups).map(([show,entries])=>
    '<div class="show-group"><div class="show-label">🎬 '+esc(show)+'</div><div class="cards-row">'
    +entries.map(e=>
      '<div class="char-card">'
      +'<div class="char-name">'+esc(e.charName||'Unnamed')+'</div>'
      +'<div class="char-occ">'+esc(e.occupation||'')+'</div>'
      +'<div class="char-date">'+(e.savedAt?new Date(e.savedAt).toLocaleDateString():'Draft')+'</div>'
      +'<div class="char-actions">'
      +'<button class="ccard-btn study" data-id="'+e.id+'">Study</button>'
      +'<button class="ccard-btn edit" data-id="'+e.id+'">Edit</button>'
      +'<button class="ccard-btn del" data-id="'+e.id+'">✕</button>'
      +'</div></div>'
    ).join('')
    +'</div></div>'
  ).join('');

  body.querySelectorAll('.ccard-btn.study').forEach(b=>b.addEventListener('click',()=>openStudy(b.dataset.id)));
  body.querySelectorAll('.ccard-btn.edit' ).forEach(b=>b.addEventListener('click',()=>editEntry(b.dataset.id)));
  body.querySelectorAll('.ccard-btn.del'  ).forEach(b=>b.addEventListener('click',()=>delEntry(b.dataset.id)));
}

// ══════════════════════════════════════
// ENTRY ACTIONS
// ══════════════════════════════════════
function startNew(){
  draft=freshDraft();
  section=0;
  show('question-view');
  populate();
  goTo(0);
}

function editEntry(id){
  const e=library.find(x=>x.id===id);
  if(!e) return;
  draft={...e,senses:{...(e.senses||{})}};
  section=0;
  show('question-view');
  populate();
  goTo(0);
}

function delEntry(id){
  if(!confirm('Delete this character? This cannot be undone.')) return;
  library=library.filter(e=>e.id!==id);
  saveLocal(); pushSync(); updateBadge(); renderLib();
  toast('Deleted.');
}

function openStudy(id){
  const e=library.find(x=>x.id===id);
  if(!e) return;
  studyId=id;
  renderStudy(e);
  show('study');
}

// ══════════════════════════════════════
// STUDY
// ══════════════════════════════════════
function renderStudy(e){
  document.getElementById('study-char').textContent=e.charName||'Unnamed';
  document.getElementById('study-show').textContent=e.showName||'';
  const body=document.getElementById('study-body');
  let h='';

  const sv=SENSES.filter(s=>e.senses&&e.senses[s]);
  if(sv.length){
    h+='<div class="study-senses"><div class="study-senses-title">The 5 Senses</div><div class="study-senses-row">'
      +sv.map(s=>'<div class="sense-chip"><span class="sense-chip-name">'+s+'</span><span class="sense-chip-val">'+esc(e.senses[s])+'</span></div>').join('')
      +'</div></div>';
  }

  h+='<div class="study-accordion">';
  SECTIONS.forEach(sec=>{
    const filled=sec.fields.filter(f=>(e[f.id]||'').trim());
    if(!filled.length) return;
    const uid='ap-'+sec.id;
    h+='<div class="acc-item">'
      +'<button class="acc-btn" data-t="'+uid+'">'
      +'<span class="acc-btn-title">'+sec.title+'</span>'
      +'<span class="acc-count">'+filled.length+'/'+sec.fields.length+'</span>'
      +'<span class="acc-arrow">▼</span></button>'
      +'<div class="acc-panel" id="'+uid+'"><div class="acc-grid">'
      +filled.map(f=>'<div'+(f.full?' class="field-full"':'')+'><div class="acc-f-label">'+f.label+'</div><div class="acc-f-val">'+esc(e[f.id])+'</div></div>').join('')
      +'</div></div></div>';
  });
  h+='</div>';

  if(e.notes&&e.notes.trim()){
    h+='<div class="study-notes"><div class="study-notes-title">✎ Notes</div><div class="study-notes-val">'+esc(e.notes)+'</div></div>';
  }

  body.innerHTML=h;
  body.querySelectorAll('.acc-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const panel=document.getElementById(btn.dataset.t);
      if(!panel) return;
      const open=panel.classList.toggle('open');
      btn.classList.toggle('open',open);
    });
  });
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
let toastT=null;
function toast(msg,type){
  const el=document.getElementById('toast');
  if(!el) return;
  el.textContent=msg;
  el.className='show'+(type?' '+type:'');
  clearTimeout(toastT);
  toastT=setTimeout(()=>{el.className='';},2800);
}

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  loadLocal();
  buildForm();
  updateBadge();

  // Sync on load
  pullSync();

  // Periodic sync
  if(syncOn()) setInterval(()=>{ capture(); pushSync(); },CFG.INTERVAL);
  else setSync('ok','Working locally');

  // Save on close / background
  window.addEventListener('beforeunload',()=>{ capture(); autoSaveLib(); saveLocal(); });
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden'){ capture(); autoSaveLib(); saveLocal(); pushSync(); }
  });

  // ── BUTTON WIRING ──
  document.getElementById('btn-new').addEventListener('click',startNew);
  document.getElementById('btn-library').addEventListener('click',()=>show('library'));

  document.getElementById('q-home-btn').addEventListener('click',()=>{ capture(); autoSaveLib(); saveLocal(); show('home'); });
  document.getElementById('q-lib-btn').addEventListener('click',()=>{ capture(); autoSaveLib(); saveLocal(); show('library'); });
  document.getElementById('q-save-btn').addEventListener('click',manualSave);

  document.getElementById('nav-prev').addEventListener('click',()=>goTo(section-1));
  document.getElementById('nav-next').addEventListener('click',()=>{ if(section===SECTIONS.length-1) manualSave(); else goTo(section+1); });

  document.getElementById('lib-home-btn').addEventListener('click',()=>show('home'));
  document.getElementById('lib-new-btn').addEventListener('click',startNew);
  document.getElementById('lib-search').addEventListener('input',renderLib);

  document.getElementById('study-lib-btn').addEventListener('click',()=>show('library'));
  document.getElementById('study-edit-btn').addEventListener('click',()=>{ if(studyId) editEntry(studyId); });

  // Mobile nav toggle
  document.getElementById('mnav-trigger').addEventListener('click',()=>{
    mnavOpen=!mnavOpen;
    document.getElementById('mnav-dropdown').classList.toggle('open',mnavOpen);
    document.getElementById('mnav-arrow').classList.toggle('open',mnavOpen);
  });
});
